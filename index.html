<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gang Stats Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0f1117;
font-family:'Inter',sans-serif;
color:#e6edf3;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
font-weight:600;
font-size:34px;
}

.subtitle{
color:#8b949e;
margin-bottom:30px;
}

.upload-area{
border:2px dashed #30363d;
border-radius:12px;
padding:60px;
text-align:center;
cursor:pointer;
transition:0.25s;
margin-bottom:30px;
}

.upload-area.dragover{
border-color:#58a6ff;
background:#161b22;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#161b22;
border-radius:12px;
padding:20px;
}

textarea{
width:100%;
height:170px;
background:#0d1117;
border:none;
border-radius:8px;
padding:10px;
color:#79c0ff;
font-family:monospace;
resize:none;
}

button{
margin-top:10px;
background:#238636;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2ea043;
}

.total{
grid-column:1/3;
text-align:center;
font-size:22px;
font-weight:600;
padding:30px;
}

input{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Gang Stats Dashboard</h1>
<div class="subtitle">Upload your weekly duty CSV</div>

<div class="upload-area" id="uploadArea">
📂 Drag & Drop CSV Anywhere or Click to Upload
<input type="file" id="csvFile" accept=".csv">
</div>

<div class="grid">

<div class="card">
<h2>🏆 Player Leaderboard</h2>
<textarea id="players"></textarea>
<button onclick="copyText('players')">Copy</button>
</div>

<div class="card">
<h2>🏴 Gang Hours Leaderboard</h2>
<textarea id="gangs"></textarea>
<button onclick="copyText('gangs')">Copy</button>
</div>

<div class="card total">
<div id="totalHours">Upload a CSV to calculate total hours</div>
<button onclick="copyText('totalHours')">Copy</button>
</div>

</div>

</div>

<script>

const uploadArea = document.getElementById("uploadArea")
const fileInput = document.getElementById("csvFile")

uploadArea.addEventListener("click", () => fileInput.click())

fileInput.addEventListener("change", e => {
handleFile(e.target.files[0])
})

document.addEventListener("dragover", e => {
e.preventDefault()
uploadArea.classList.add("dragover")
})

document.addEventListener("dragleave", e => {
uploadArea.classList.remove("dragover")
})

document.addEventListener("drop", e => {

e.preventDefault()
uploadArea.classList.remove("dragover")

if(e.dataTransfer.files.length){
handleFile(e.dataTransfer.files[0])
}

})

function handleFile(file){

const reader = new FileReader()

reader.onload = function(e){

const lines = e.target.result.split("\n").slice(1)

let players={}
let gangs={}

lines.forEach(line=>{

let parts=line.split(",")

if(parts.length<4)return

let id=parts[1].replace(/"/g,"")
let gang=parts[2].replace(/"/g,"")
let minutes=parseFloat(parts[3].replace(/"/g,""))

players[id]=(players[id]||0)+minutes
gangs[gang]=(gangs[gang]||0)+minutes

})

let playerArray=Object.entries(players).map(p=>[p[0],p[1]/60])
let gangArray=Object.entries(gangs).map(g=>[g[0],g[1]/60])

playerArray.sort((a,b)=>b[1]-a[1])
gangArray.sort((a,b)=>b[1]-a[1])

let playerMsg=""

for(let i=0;i<10 && i<playerArray.length;i++){
playerMsg+=`${i+1}. <@${playerArray[i][0]}> — ${playerArray[i][1].toFixed(2)} hrs\n`
}

let gangMsg=""

gangArray.forEach((g,i)=>{
gangMsg+=`${i+1}. ${g[0]} — ${g[1].toFixed(2)} hrs\n`
})

let totalHours=playerArray.reduce((sum,p)=>sum+p[1],0)

document.getElementById("players").value=playerMsg
document.getElementById("gangs").value=gangMsg
document.getElementById("totalHours").innerText=`Total Gang Hours This Week: ${totalHours.toFixed(2)} hrs`

}

reader.readAsText(file)

}

function copyText(id){

let text

if(id==="totalHours"){
text=document.getElementById(id).innerText
}else{
text=document.getElementById(id).value
}

navigator.clipboard.writeText(text)

}

</script>

</body>
</html>
