<!DOCTYPE html>
<html>
<head>

<title>Gang Activity Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0f1117;
color:#e6edf3;
font-family:Inter;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.upload{
border:2px dashed #30363d;
padding:60px;
border-radius:12px;
text-align:center;
cursor:pointer;
margin-bottom:30px;
}

.upload:hover{
border-color:#58a6ff;
background:#161b22;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #30363d;
}

button{
background:#238636;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

input{
padding:10px;
border-radius:6px;
border:none;
background:#0d1117;
color:white;
width:100%;
margin-bottom:10px;
}

.result{
margin-top:10px;
font-size:14px;
color:#79c0ff;
}

</style>

</head>

<body>

<div class="container">

<h1>Gang Activity Dashboard</h1>

<div class="upload" id="uploadArea">
Drop CSV or Click to Upload
<input type="file" id="csvFile" hidden>
</div>

<div class="grid">

<div class="card">

<h3>🏆 Player Leaderboard</h3>

<table id="playerTable">
<tr>
<th>Rank</th>
<th>Name</th>
<th>Hours</th>
</tr>
</table>

<button onclick="copyPlayerLeaderboard()">Copy Discord Leaderboard</button>

</div>

<div class="card">

<h3>🏴 Gang Hours Leaderboard</h3>

<table id="gangTable">
<tr>
<th>Rank</th>
<th>Gang</th>
<th>Hours</th>
</tr>
</table>

<button onclick="copyGangLeaderboard()">Copy Gang Leaderboard</button>

<div class="result" id="gangTotal"></div>

</div>

<div class="card">

<h3>🔍 Player Search</h3>

<input id="searchId" placeholder="Enter Discord ID">

<button onclick="searchPlayer()">Search</button>

<div class="result" id="searchResult"></div>

</div>

</div>

</div>

<script>

let currentPlayers=[]
let currentGangs=[]

const uploadArea=document.getElementById("uploadArea")
const fileInput=document.getElementById("csvFile")

uploadArea.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
processFile(e.target.files[0])
}

uploadArea.addEventListener("dragover",e=>{
e.preventDefault()
})

uploadArea.addEventListener("drop",e=>{
e.preventDefault()
processFile(e.dataTransfer.files[0])
})

function processFile(file){

const reader=new FileReader()

reader.onload=function(e){

const rows=e.target.result.split("\n").slice(1)

let players={}
let gangs={}

rows.forEach(r=>{

let cols=r.split(",")

if(cols.length<4)return

let name=cols[0].replace(/"/g,"")
let id=cols[1].replace(/"/g,"")
let gang=cols[2].replace(/"/g,"")
let mins=parseFloat(cols[3].replace(/"/g,""))

if(!players[id]){
players[id]={name:name,minutes:0}
}

players[id].minutes+=mins

gangs[gang]=(gangs[gang]||0)+mins

})

let playerArr=Object.entries(players).map(p=>({
id:p[0],
name:p[1].name,
hours:p[1].minutes/60
}))

playerArr.sort((a,b)=>b.hours-a.hours)

currentPlayers=playerArr

let gangArr=Object.entries(gangs).map(g=>({
name:g[0],
hours:g[1]/60
}))

gangArr.sort((a,b)=>b.hours-a.hours)

currentGangs=gangArr

// ✅ TOTAL GANG HOURS CALCULATION
let totalGangHours = gangArr.reduce((sum, g) => sum + g.hours, 0)
document.getElementById("gangTotal").innerText =
`Total Gang Hours: ${totalGangHours.toFixed(2)} hrs`

renderPlayers(playerArr)
renderGangs(gangArr)

}

reader.readAsText(file)

}

function renderPlayers(arr){

const table=document.getElementById("playerTable")

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Name</th>
<th>Hours</th>
</tr>
`

arr.slice(0,10).forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.hours.toFixed(2)}</td>
</tr>
`

})

}

function renderGangs(arr){

const table=document.getElementById("gangTable")

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Gang</th>
<th>Hours</th>
</tr>
`

arr.forEach((g,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${g.name}</td>
<td>${g.hours.toFixed(2)}</td>
</tr>
`

})

}

function copyPlayerLeaderboard(){

let text=""

currentPlayers.slice(0,10).forEach((p,i)=>{

text+=`${i+1}. <@${p.id}> — ${p.hours.toFixed(2)} hrs\n`

})

navigator.clipboard.writeText(text)

}

function copyGangLeaderboard(){

let text=""

currentGangs.forEach((g,i)=>{

text+=`${i+1}. ${g.name} — ${g.hours.toFixed(2)} hrs\n`

})

navigator.clipboard.writeText(text)

}

function searchPlayer(){

const id=document.getElementById("searchId").value

let player=currentPlayers.find(p=>p.id===id)

if(!player){

document.getElementById("searchResult").innerText="Player not found in this week's CSV"

return

}

document.getElementById("searchResult").innerText=
`${player.name} (<@${player.id}>) — ${player.hours.toFixed(2)} hours`

}

</script>

</body>
</html>
